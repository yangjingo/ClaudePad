name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          fi

      - name: Package Linux x64
        run: npm run package:linux

      - name: Package Windows x64
        run: npm run package:win

      - name: List build artifacts
        run: ls -lh build/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: claudepad-linux-x64
          path: build/claudepad-v*-linux-x64

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: claudepad-win-x64
          path: build/claudepad-v*-win-x64.exe

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          fi

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: claudepad-linux-x64
          path: ./artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: claudepad-win-x64
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: ClaudePad v${{ steps.version.outputs.VERSION }}
          body: |
            ## ClaudePad v${{ steps.version.outputs.VERSION }}

            ### Downloads
            - Linux x64: `claudepad-v${{ steps.version.outputs.VERSION }}-linux-x64`
            - Windows x64: `claudepad-v${{ steps.version.outputs.VERSION }}-win-x64.exe`

            ### npm
            ```bash
            npm install -g claudepad
            claudepad
            ```

            ### Usage
            ```bash
            # Linux
            chmod +x claudepad-v*-linux-x64
            ./claudepad-v*-linux-x64

            # Windows
            claudepad-v*-win-x64.exe
            ```
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}