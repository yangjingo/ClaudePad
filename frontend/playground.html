<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClaudePad | Link's Command Center</title>
  <style>
    :root {
      --slate-bg: #0a0a0f;
      --slate-bg-light: #111118;
      --slate-bg-lighter: #1a1a24;
      --slate-panel: #13131a;
      --bronze: #8B7355;
      --bronze-light: #A0826D;
      --bronze-dark: #6b5b4f;
      --bronze-dim: #4a3f37;
      --cyan: #00d4ff;
      --cyan-bright: #00f0ff;
      --cyan-dim: #00a8cc;
      --cyan-glow: rgba(0, 212, 255, 0.3);
      --text: #e0e0e0;
      --text-muted: #888;
      --text-dark: #666;
      --status-active: #00d4ff;
      --status-idle: #666;
      --status-busy: #ff9800;
      --status-offline: #444;
      --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--slate-bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Header */
    .header {
      background: var(--slate-bg-light);
      border-bottom: 1px solid var(--bronze-dim);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      color: var(--cyan);
      font-size: 1.5rem;
      text-shadow: 0 0 10px var(--cyan-glow);
    }

    .logo-text {
      font-family: var(--font-mono);
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--bronze-light);
    }

    .nav-links {
      display: flex;
      gap: 12px;
    }

    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }

    .nav-link:hover, .nav-link.active {
      color: var(--cyan);
      background: var(--cyan-glow);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Command Center Header */
    .command-header {
      text-align: center;
      margin-bottom: 32px;
      padding: 24px;
      background: linear-gradient(135deg, var(--slate-bg-light) 0%, var(--slate-panel) 100%);
      border: 2px solid var(--bronze-dim);
      border-radius: var(--radius-lg);
      position: relative;
    }

    .command-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--bronze), var(--cyan), var(--bronze));
    }

    .command-header h1 {
      font-family: var(--font-mono);
      font-size: 1.8rem;
      color: var(--bronze-light);
      margin-bottom: 8px;
    }

    .command-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Main Dashboard Grid */
    .dashboard {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    @media (max-width: 900px) {
      .dashboard {
        grid-template-columns: 1fr;
      }
    }

    /* Link Commander Panel */
    .commander-panel {
      background: var(--slate-panel);
      border: 2px solid var(--bronze);
      border-radius: var(--radius-lg);
      padding: 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .commander-panel::before {
      content: '◈ COMMANDER ◈';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(90deg, var(--bronze), var(--bronze-dark));
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      padding: 6px;
      letter-spacing: 2px;
    }

    .commander-avatar {
      width: 140px;
      height: 140px;
      margin: 32px auto 16px;
      border-radius: 50%;
      border: 4px solid var(--cyan);
      overflow: hidden;
      box-shadow: 0 0 30px var(--cyan-glow);
      position: relative;
    }

    .commander-avatar::after {
      content: '♔';
      position: absolute;
      top: -8px;
      right: -8px;
      width: 32px;
      height: 32px;
      background: var(--bronze);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      border: 2px solid var(--slate-panel);
    }

    .commander-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .commander-name {
      font-family: var(--font-mono);
      font-size: 1.4rem;
      color: var(--cyan);
      margin-bottom: 4px;
    }

    .commander-title {
      color: var(--bronze-light);
      font-size: 0.85rem;
      margin-bottom: 20px;
    }

    /* Commander Stats */
    .commander-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .cmd-stat {
      background: var(--slate-bg-light);
      border: 1px solid var(--bronze-dim);
      border-radius: var(--radius-sm);
      padding: 12px;
    }

    .cmd-stat-value {
      font-family: var(--font-mono);
      font-size: 1.3rem;
      color: var(--cyan);
      font-weight: 600;
    }

    .cmd-stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Commander Controls */
    .commander-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cmd-btn {
      padding: 12px;
      border: 1px solid var(--bronze-dim);
      background: var(--slate-bg-light);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .cmd-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .cmd-btn.primary {
      background: linear-gradient(135deg, var(--bronze), var(--bronze-dark));
      border-color: var(--bronze);
    }

    .cmd-btn.primary:hover {
      background: linear-gradient(135deg, var(--bronze-light), var(--bronze));
    }

    /* Sub-Agents Panel */
    .subagents-panel {
      background: var(--slate-panel);
      border: 1px solid var(--bronze-dim);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--bronze-dim);
      flex-shrink: 0;
    }

    .panel-title {
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--bronze-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-actions {
      display: flex;
      gap: 8px;
    }

    .panel-btn {
      padding: 6px 12px;
      border: 1px solid var(--bronze-dim);
      background: var(--slate-bg-light);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
    }

    .panel-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    /* Sub-Agent Grid - 2x2 Harmonious Layout */
    .subagent-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 16px;
      flex: 1;
      min-height: 0;
    }

    .subagent-card {
      background: var(--slate-bg-light);
      border: 2px solid var(--bronze-dim);
      border-radius: var(--radius-md);
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .subagent-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--bronze);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .subagent-card:hover::before,
    .subagent-card.active::before {
      transform: scaleX(1);
    }

    .subagent-card:hover {
      border-color: var(--bronze);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .subagent-card.active {
      border-color: var(--cyan);
      box-shadow: 0 0 20px var(--cyan-glow);
    }

    /* Card Type Indicators */
    .subagent-card[data-type="healer"] { border-top-color: #4ade80; }
    .subagent-card[data-type="scout"] { border-top-color: #60a5fa; }
    .subagent-card[data-type="assault"] { border-top-color: #fbbf24; }
    .subagent-card[data-type="defense"] { border-top-color: #f87171; }

    .subagent-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .subagent-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 3px solid var(--bronze-dim);
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      transition: all 0.3s;
    }

    .subagent-card:hover .subagent-avatar,
    .subagent-card.active .subagent-avatar {
      border-color: var(--cyan);
      box-shadow: 0 0 15px var(--cyan-glow);
    }

    .subagent-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .subagent-status {
      position: absolute;
      bottom: 3px;
      right: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 3px solid var(--slate-bg-light);
    }

    .subagent-status.active {
      background: var(--status-active);
      box-shadow: 0 0 8px var(--cyan);
      animation: pulse 2s infinite;
    }

    .subagent-status.idle {
      background: var(--status-idle);
    }

    .subagent-status.busy {
      background: var(--status-busy);
      animation: blink 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0.8; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .subagent-info h3 {
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--bronze-light);
      margin-bottom: 2px;
    }

    .subagent-info .role {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .role-icon {
      font-size: 0.85rem;
    }

    /* Task Section */
    .task-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 0;
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .task-name {
      font-size: 0.8rem;
      color: var(--text);
      font-weight: 500;
    }

    .task-percent {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--cyan);
      font-weight: 600;
    }

    .progress-container {
      background: var(--slate-bg);
      border-radius: 6px;
      height: 8px;
      overflow: hidden;
      position: relative;
      margin-bottom: 12px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--bronze), var(--cyan));
      border-radius: 6px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Stats Row */
    .subagent-stats {
      display: flex;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid var(--bronze-dim);
      flex-shrink: 0;
    }

    .stat-box {
      text-align: center;
      flex: 1;
    }

    .stat-box:not(:last-child) {
      border-right: 1px solid var(--bronze-dim);
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--cyan);
      font-weight: 600;
    }

    .stat-label {
      font-size: 0.6rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Command Log */
    .command-log {
      background: var(--slate-panel);
      border: 1px solid var(--bronze-dim);
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    .log-title {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--bronze-light);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .log-entries {
      max-height: 250px;
      overflow-y: auto;
    }

    .log-entry {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--bronze-dim);
      font-size: 0.85rem;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-time {
      font-family: var(--font-mono);
      color: var(--text-muted);
      font-size: 0.7rem;
      min-width: 50px;
    }

    .log-agent {
      font-family: var(--font-mono);
      color: var(--bronze-light);
      font-size: 0.75rem;
      min-width: 70px;
    }

    .log-action {
      flex: 1;
      color: var(--text);
    }

    .log-status {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 500;
    }

    .log-status.success {
      background: rgba(0, 212, 255, 0.1);
      color: var(--cyan);
    }

    .log-status.pending {
      background: rgba(255, 152, 0, 0.1);
      color: var(--status-busy);
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .subagent-grid {
        gap: 16px;
      }

      .subagent-card {
        padding: 20px;
      }

      .subagent-avatar {
        width: 56px;
        height: 56px;
      }
    }

    @media (max-width: 900px) {
      .dashboard {
        grid-template-columns: 1fr;
      }

      .commander-panel {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 20px;
        align-items: center;
      }

      .commander-avatar {
        width: 100px;
        height: 100px;
        margin: 0;
      }

      .commander-stats {
        margin-bottom: 0;
      }

      .commander-controls {
        flex-direction: row;
        flex-wrap: wrap;
      }

      .subagent-grid {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 16px;
      }

      .commander-panel {
        display: flex;
        flex-direction: column;
        text-align: center;
      }

      .commander-avatar {
        width: 120px;
        height: 120px;
        margin: 0 auto;
      }

      .commander-controls {
        flex-direction: column;
      }

      .subagent-grid {
        grid-template-columns: 1fr;
      }

      .subagent-card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <a href="/" class="logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">ClaudePad</span>
    </a>
    <nav class="nav-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/idea.html" class="nav-link">Ideas</a>
      <a href="/tips.html" class="nav-link">Tips</a>
      <a href="/playground.html" class="nav-link active">Playground</a>
    </nav>
  </header>

  <main class="container">
    <!-- Command Center Header -->
    <section class="command-header">
      <h1>◈ Link's Command Center ◈</h1>
      <p>Master control interface for the Champion Squad</p>
    </section>

    <!-- Main Dashboard -->
    <div class="dashboard">
      <!-- Link Commander Panel -->
      <div class="commander-panel">
        <div class="commander-avatar">
          <img src="/asserts/zelda-icon/link.png" alt="Link" onerror="this.style.display='none'">
        </div>
        <div class="commander-name">Link</div>
        <div class="commander-title">Hero of Hyrule | Squad Leader</div>

        <div class="commander-stats">
          <div class="cmd-stat">
            <div class="cmd-stat-value" id="cmd-active">3</div>
            <div class="cmd-stat-label">Active</div>
          </div>
          <div class="cmd-stat">
            <div class="cmd-stat-value" id="cmd-tasks">128</div>
            <div class="cmd-stat-label">Tasks</div>
          </div>
          <div class="cmd-stat">
            <div class="cmd-stat-value" id="cmd-uptime">12h</div>
            <div class="cmd-stat-label">Uptime</div>
          </div>
          <div class="cmd-stat">
            <div class="cmd-stat-value" id="cmd-load">72%</div>
            <div class="cmd-stat-label">Load</div>
          </div>
        </div>

        <div class="commander-controls">
          <button class="cmd-btn primary" onclick="deployAll()">🚀 Deploy All</button>
          <button class="cmd-btn" onclick="recallAll()">📥 Recall All</button>
          <button class="cmd-btn" onclick="refreshStatus()">↻ Refresh</button>
          <button class="cmd-btn" onclick="toggleSim()">▶ Simulate</button>
        </div>
      </div>

      <!-- Sub-Agents Panel -->
      <div class="subagents-panel">
        <div class="panel-header">
          <div class="panel-title">
            <span>◈</span>
            <span>Champion Squad Status</span>
          </div>
          <div class="panel-actions">
            <button class="panel-btn" onclick="selectAll()">Select All</button>
            <button class="panel-btn" onclick="clearSelection()">Clear</button>
          </div>
        </div>

        <div class="subagent-grid" id="subagent-grid">
          <!-- Sub-agents rendered here -->
        </div>
      </div>
    </div>

    <!-- Command Log -->
    <div class="command-log">
      <div class="log-title">
        <span>◈</span>
        <span>Squad Activity Log</span>
      </div>
      <div class="log-entries" id="log-entries">
        <!-- Logs rendered here -->
      </div>
    </div>
  </main>

  <script>
    // Sub-agents data (Link's team)
    const subAgents = [
      {
        id: 'mipha',
        name: 'Mipha',
        role: 'Healer / Support',
        type: 'healer',
        icon: '💚',
        avatar: '/asserts/zelda-icon/mipha.png',
        status: 'active',
        task: 'Healing Wave',
        progress: 78,
        tasksDone: 67,
        cpu: 32
      },
      {
        id: 'revali',
        name: 'Revali',
        role: 'Recon / Scout',
        type: 'scout',
        icon: '💨',
        avatar: '/asserts/zelda-icon/revali.png',
        status: 'busy',
        task: 'Aerial Survey',
        progress: 45,
        tasksDone: 23,
        cpu: 78
      },
      {
        id: 'urbosa',
        name: 'Urbosa',
        role: 'Assault / Power',
        type: 'assault',
        icon: '⚡',
        avatar: '/asserts/zelda-icon/urbosa.png',
        status: 'active',
        task: 'Thunder Strike',
        progress: 92,
        tasksDone: 89,
        cpu: 38
      },
      {
        id: 'daruk',
        name: 'Daruk',
        role: 'Defense / Tank',
        type: 'defense',
        icon: '🛡️',
        avatar: '/asserts/zelda-icon/darurk.png',
        status: 'idle',
        task: 'Shield Guard',
        progress: 25,
        tasksDone: 12,
        cpu: 15
      }
    ];

    let selectedAgents = new Set();
    let simInterval = null;

    // Activity log
    const logs = [
      { time: '14:32', agent: 'Mipha', action: 'Restored squad health', status: 'success' },
      { time: '14:28', agent: 'Revali', action: 'Detected enemy movement', status: 'pending' },
      { time: '14:25', agent: 'Urbosa', action: 'Charged lightning attack', status: 'success' },
      { time: '14:20', agent: 'Daruk', action: 'Activated shield barrier', status: 'success' },
      { time: '14:15', agent: 'Link', action: 'Issued new directive', status: 'success' },
    ];

    function renderSubAgents() {
      const grid = document.getElementById('subagent-grid');
      grid.innerHTML = subAgents.map(agent => `
        <div class="subagent-card ${selectedAgents.has(agent.id) ? 'active' : ''}"
             onclick="toggleSelect('${agent.id}')"
             data-id="${agent.id}"
             data-type="${agent.type}">
          <div class="subagent-header">
            <div class="subagent-avatar">
              <img src="${agent.avatar}" alt="${agent.name}"
                   onerror="this.parentElement.innerHTML='<div style=\"display:flex;align-items:center;justify-content:center;height:100%;font-size:1.5rem;\">◈</div>'">
              <div class="subagent-status ${agent.status}"></div>
            </div>
            <div class="subagent-info">
              <h3>${agent.name}</h3>
              <div class="role">
                <span class="role-icon">${agent.icon}</span>
                <span>${agent.role}</span>
              </div>
            </div>
          </div>

          <div class="task-section">
            <div class="task-header">
              <span class="task-name">${agent.task}</span>
              <span class="task-percent">${agent.progress}%</span>
            </div>
            <div class="progress-container">
              <div class="progress-fill" style="width: ${agent.progress}%"></div>
            </div>

            <div class="subagent-stats">
              <div class="stat-box">
                <div class="stat-value">${agent.tasksDone}</div>
                <div class="stat-label">Tasks</div>
              </div>
              <div class="stat-box">
                <div class="stat-value">${agent.cpu}%</div>
                <div class="stat-label">Load</div>
              </div>
              <div class="stat-box">
                <div class="stat-value">${agent.status}</div>
                <div class="stat-label">Status</div>
              </div>
            </div>
          </div>
        </div>
      `).join('');

      updateCommanderStats();
    }

    function renderLogs() {
      const container = document.getElementById('log-entries');
      container.innerHTML = logs.map(log => `
        <div class="log-entry">
          <span class="log-time">${log.time}</span>
          <span class="log-agent">${log.agent}</span>
          <span class="log-action">${log.action}</span>
          <span class="log-status ${log.status}">${log.status}</span>
        </div>
      `).join('');
    }

    function updateCommanderStats() {
      const activeCount = subAgents.filter(a => a.status === 'active').length;
      const totalTasks = subAgents.reduce((sum, a) => sum + a.tasksDone, 0);
      const avgCpu = Math.round(subAgents.reduce((sum, a) => sum + a.cpu, 0) / subAgents.length);

      document.getElementById('cmd-active').textContent = activeCount;
      document.getElementById('cmd-tasks').textContent = totalTasks;
      document.getElementById('cmd-load').textContent = avgCpu + '%';
    }

    function toggleSelect(agentId) {
      if (selectedAgents.has(agentId)) {
        selectedAgents.delete(agentId);
      } else {
        selectedAgents.add(agentId);
      }
      renderSubAgents();
    }

    function selectAll() {
      subAgents.forEach(a => selectedAgents.add(a.id));
      renderSubAgents();
    }

    function clearSelection() {
      selectedAgents.clear();
      renderSubAgents();
    }

    function deployAll() {
      subAgents.forEach(agent => {
        agent.status = 'active';
        agent.progress = Math.min(100, agent.progress + 10);
      });
      addLog('Link', 'Deployed all champions', 'success');
      renderSubAgents();
    }

    function recallAll() {
      subAgents.forEach(agent => {
        agent.status = 'idle';
        agent.progress = Math.max(0, agent.progress - 10);
      });
      addLog('Link', 'Recalled all champions', 'success');
      renderSubAgents();
    }

    function refreshStatus() {
      subAgents.forEach(agent => {
        agent.cpu = Math.max(10, Math.min(95, agent.cpu + (Math.random() - 0.5) * 20));
        agent.progress = Math.max(0, Math.min(100, agent.progress + (Math.random() - 0.5) * 10));
      });
      addLog('Link', 'Refreshed squad status', 'success');
      renderSubAgents();
    }

    function toggleSim() {
      if (simInterval) {
        clearInterval(simInterval);
        simInterval = null;
        addLog('Link', 'Simulation stopped', 'success');
      } else {
        simInterval = setInterval(() => {
          subAgents.forEach(agent => {
            // Random status changes
            if (Math.random() < 0.1) {
              const statuses = ['active', 'idle', 'busy'];
              agent.status = statuses[Math.floor(Math.random() * statuses.length)];
            }
            agent.cpu = Math.max(5, Math.min(95, agent.cpu + (Math.random() - 0.5) * 10));
            agent.progress = Math.max(0, Math.min(100, agent.progress + (Math.random() - 0.5) * 5));
          });
          renderSubAgents();
        }, 2000);
        addLog('Link', 'Simulation started', 'success');
      }
    }

    function addLog(agent, action, status) {
      const now = new Date();
      const time = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
      logs.unshift({ time, agent, action, status });
      if (logs.length > 20) logs.pop();
      renderLogs();
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      renderSubAgents();
      renderLogs();
    });
  </script>
</body>
</html>
