<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClaudePad | Terminal</title>
  <link rel="stylesheet" href="/asserts/lib/xterm/xterm.css" />
  <script src="/asserts/lib/xterm/xterm.js"></script>
  <script src="/asserts/lib/xterm/addon-fit.js"></script>
  <style>
    /* ============================================
     * SHEIKAH SLATE THEME
     * Ancient Futurism - Bronze & Cyan
     * ============================================ */
    :root {
      /* Background - Sheikah Slate colors */
      --slate-bg: #0a0a0f;
      --slate-bg-light: #111118;
      --slate-bg-lighter: #1a1a24;
      --slate-panel: #13131a;

      /* Bronze/Copper Ancient Metal */
      --bronze: #8B7355;
      --bronze-light: #A0826D;
      --bronze-dark: #6b5b4f;
      --bronze-dim: #4a3f37;

      /* Cyan Glow - Tech Energy */
      --cyan: #00d4ff;
      --cyan-bright: #00f0ff;
      --cyan-dim: #00a8cc;
      --cyan-glow: rgba(0, 212, 255, 0.3);

      /* Text */
      --text: #e0e0e0;
      --text-muted: #888;
      --text-dark: #666;

      /* Status Colors */
      --status-active: #00d4ff;
      --status-done: #4ade80;
      --status-error: #ef4444;
      --status-pending: #666;

      /* Typography */
      --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      /* Spacing */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;

      /* Border Radius */
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
      --radius-full: 9999px;
    }

    /* ============================================
     * Reset & Base
     * ============================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--slate-bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ============================================
     * Header / Navigation
     * ============================================ */
    .header {
      background: var(--slate-bg-light);
      border-bottom: 1px solid var(--bronze-dim);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .back {
      color: var(--cyan);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--bronze-dim);
      transition: all 0.2s;
    }

    .back:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 10px var(--cyan-glow);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      color: var(--cyan);
      font-size: 1.5rem;
      text-shadow: 0 0 10px var(--cyan-glow);
    }

    .logo-text {
      font-family: var(--font-mono);
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--bronze-light);
    }

    .status { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-family: var(--font-mono); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
    .dot.connected { background: var(--status-done); box-shadow: 0 0 8px var(--status-done); }

    /* ============================================
     * Overlay
     * ============================================ */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 15, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .overlay-content {
      background: var(--slate-panel);
      border: 1px solid var(--bronze);
      border-radius: var(--radius-lg);
      padding: 24px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: scaleIn 0.2s ease-out;
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .overlay-title {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* ============================================
     * Info Card
     * ============================================ */
    .info-card {
      background: var(--slate-bg-light);
      border: 1px solid var(--bronze-dim);
      border-radius: var(--radius-md);
      padding: 16px;
      margin: 16px 0;
      text-align: left;
    }

    .info-card h3 {
      color: var(--bronze-light);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .info-card .stat {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--bronze-dim);
      font-size: 0.8rem;
    }

    .info-card .stat:last-child {
      border-bottom: none;
    }

    .info-card .stat-label {
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.75rem;
    }

    .info-card .stat-value {
      color: var(--text);
      font-family: var(--font-mono);
      text-align: right;
      word-break: break-all;
      max-width: 60%;
    }

    .info-card code {
      display: block;
      background: rgba(0, 212, 255, 0.1);
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--bronze-dim);
      font-size: 0.8rem;
      color: var(--cyan);
      word-break: break-all;
      font-family: var(--font-mono);
      margin: 8px 0;
    }

    .info-card p {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin: 8px 0;
    }

    /* ============================================
     * Buttons
     * ============================================ */
    .btn {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: transparent;
      color: var(--cyan);
      box-shadow: inset 0 0 0 1px var(--cyan-dim);
    }

    .btn-primary:hover {
      background: var(--cyan-glow);
      box-shadow: inset 0 0 0 1px var(--cyan), 0 0 20px var(--cyan-glow);
    }

    .btn-secondary {
      background: transparent;
      color: var(--bronze-light);
      box-shadow: inset 0 0 0 1px var(--bronze-dim);
      font-size: 0.8rem;
      padding: 6px 12px;
    }

    .btn-secondary:hover {
      color: var(--cyan);
      box-shadow: inset 0 0 0 1px var(--cyan-dim);
    }

    .btn-block {
      width: 100%;
      justify-content: center;
      padding: 10px 20px;
      font-weight: 600;
    }

    /* ============================================
     * Spinner
     * ============================================ */
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--bronze-dim);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .hidden { display: none !important; }

    /* ============================================
     * Terminal Container
     * ============================================ */
    #terminal {
      height: calc(100vh - 50px);
      padding: 16px;
    }

    /* ============================================
     * Nav Links
     * ============================================ */
    .nav-links {
      display: flex;
      gap: 12px;
    }

    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }

    .nav-link:hover {
      color: var(--cyan);
      background: var(--cyan-glow);
    }

    .nav-link.active {
      color: var(--cyan);
      border: 1px solid var(--cyan-dim);
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="/" class="back">← Back</a>
    <div class="logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">ClaudePad</span>
    </div>
    <div class="nav-links">
      <a href="/" class="nav-link">Sessions</a>
      <a href="/idea.html" class="nav-link">Ideas</a>
      <a href="/tips.html" class="nav-link">Tips</a>
    </div>
    <div class="status"><span class="dot" id="dot"></span><span id="status">Ready</span></div>
  </div>

  <div id="terminal"></div>

  <div class="overlay" id="overlay">
    <div class="overlay-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 class="overlay-title" style="margin:0;">◈ Terminal Guide</h2>
        <button class="btn btn-secondary" onclick="closeOverlay()" style="padding:4px 8px;font-size:0.75rem;">✕ Close</button>
      </div>

      <div class="info-card">
        <h3>📋 Session Information</h3>
        <div class="stat">
          <span class="stat-label">Session ID:</span>
          <span class="stat-value" id="stat-id">-</span>
        </div>
        <div class="stat">
          <span class="stat-label">Session Name:</span>
          <span class="stat-value" id="stat-name">-</span>
        </div>
        <div class="stat">
          <span class="stat-label">Status:</span>
          <span class="stat-value" id="stat-status" style="color:var(--cyan);">-</span>
        </div>
        <div class="stat">
          <span class="stat-label">Started:</span>
          <span class="stat-value" id="stat-started">-</span>
        </div>
        <div class="stat">
          <span class="stat-label">Duration:</span>
          <span class="stat-value" id="stat-duration">-</span>
        </div>
      </div>

      <div class="info-card">
        <h3>🚀 How to Resume</h3>
        <p style="margin-bottom:12px;">Run this command in your terminal:</p>
        <code id="resume-command">claude --resume xxx</code>
        <div style="display:flex;gap:8px;margin-top:12px;">
          <button class="btn btn-secondary" onclick="copyCommand()" style="flex:1;">📋 Copy</button>
          <button class="btn btn-secondary" onclick="openInExternalTerminal()" style="flex:1;">📂 Open Terminal</button>
        </div>
      </div>

      <button class="btn btn-primary btn-block" onclick="startTerminal()">▶️ Start in Browser</button>
      <p style="margin-top:12px;font-size:0.7rem;color:var(--text-muted);">
        💡 Tip: Starting in browser will run claude --resume in the background
      </p>
    </div>
  </div>

  <script>
    // Session context (local vs remote)
    let sessionContext = {
      type: 'local', // 'local' or 'remote'
      serverId: null,
      sessionId: null
    };

    // 定义全局函数供HTML调用
    function closeOverlay() {
      window.location.href = '/';
    }

    function copyCommand() {
      const cmd = getResumeCommand();
      navigator.clipboard.writeText(cmd).then(() => {
        const btn = document.querySelector('button[onclick="copyCommand()"]');
        const originalText = btn.textContent;
        btn.textContent = '✓ Copied!';
        setTimeout(() => btn.textContent = originalText, 2000);
      });
    }

    function openInExternalTerminal() {
      const cmd = getResumeCommand();
      navigator.clipboard.writeText(cmd).then(() => {
        alert('Command copied! Open your terminal and paste the command to run.');
      });
    }

    function getResumeCommand() {
      const { type, serverId, sessionId } = sessionContext;
      const id = sessionId || 'SESSION_ID';
      if (type === 'remote' && serverId) {
        return `ssh ${serverId} "claude --resume ${id}"`;
      }
      return `claude --resume ${id}`;
    }

    function startTerminal() {
      if (!sessionContext.sessionId) {
        alert('Error: No session ID found in URL. Cannot start terminal.');
        return;
      }
      document.getElementById('overlay').innerHTML = `
        <div style="text-align:center;padding:40px 20px">
          <div class="spinner"></div>
          <p style="color:var(--text-muted);font-family:var(--font-mono);font-size:0.85rem;">Starting terminal session...</p>
        </div>
      `;
      initTerminal();
    }

    // Parse URL to determine session type and IDs
    function parseSessionUrl() {
      const path = location.pathname;
      const searchParams = new URLSearchParams(location.search);
      
      const qSessionId = searchParams.get('sessionId');
      const qServerId = searchParams.get('serverId');

      if (qSessionId) {
        sessionContext = {
          type: qServerId ? 'remote' : 'local',
          serverId: qServerId,
          sessionId: qSessionId
        };
        return sessionContext;
      }

      // Local session: /terminal/:sessionId
      // Remote session: /terminal/:serverId/:sessionId
      const parts = path.split('/').filter(p => p);

      if (parts.length >= 2 && parts[0] === 'terminal') {
        if (parts.length === 2) {
          // Local session
          sessionContext = {
            type: 'local',
            serverId: null,
            sessionId: parts[1]
          };
        } else if (parts.length >= 3) {
          // Remote session
          sessionContext = {
            type: 'remote',
            serverId: parts[1],
            sessionId: parts[2]
          };
        }
      }
      return sessionContext;
    }

    // Get the appropriate API endpoint for starting the terminal
    function getStartEndpoint() {
      const { serverId, sessionId } = sessionContext;
      if (sessionContext.type === 'remote') {
        return `/api/servers/${serverId}/sessions/${sessionId}/terminal`;
      }
      return `/api/sessions/${sessionId}/terminal`;
    }

    // Get the appropriate WebSocket URL
    function getWebSocketUrl() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const host = location.host;
      const { serverId, sessionId } = sessionContext;
      if (sessionContext.type === 'remote') {
        return `${protocol}//${host}/ws/ssh/${serverId}/${sessionId}`;
      }
      return `${protocol}//${host}/ws/terminal/${sessionId}`;
    }

    // 初始化终端
    async function initTerminal() {
      console.log('[Terminal] Initializing...');
      // Parse session context from URL
      parseSessionUrl();
      const { type, serverId, sessionId } = sessionContext;
      
      if (!sessionId) {
        console.error('[Terminal] No session ID provided');
        alert('Error: No session ID found.');
        return;
      }

      // 检查库是否加载
      if (typeof window.Terminal === 'undefined') {
        const err = 'Error: xterm.js library not loaded yet. Please refresh the page.';
        console.error(err);
        alert(err);
        return;
      }

      const id = sessionId;

      // 初始化 xterm.js
      const term = new window.Terminal({
        cursorBlink: true,
        fontSize: 14,
        fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
        theme: {
          background: '#0a0a0f',
          foreground: '#e0e0e0',
          cursor: '#00d4ff',
          selection: 'rgba(0, 212, 255, 0.3)'
        }
      });

      // 兼容不同的 FitAddon 加载方式
      let fit;
      try {
        if (window.FitAddon && window.FitAddon.FitAddon) {
          fit = new window.FitAddon.FitAddon();
        } else if (window.FitAddon) {
          fit = new window.FitAddon();
        }
        
        if (fit) {
          term.loadAddon(fit);
        }
      } catch (e) {
        console.warn('[Terminal] FitAddon failed to load:', e);
      }

      term.open(document.getElementById('terminal'));
      if (fit) fit.fit();

      let ws = null;

      function handleResize() {
        if (fit) fit.fit();
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ 
            type: 'resize', 
            cols: term.cols, 
            rows: term.rows 
          }));
        }
      }

      window.addEventListener('resize', handleResize);

      term.writeln('\x1b[36m◈ ClaudePad Terminal\x1b[0m');
      if (type === 'remote') {
        term.writeln(`\x1b[90mConnecting to remote session on ${serverId}...\x1b[0m\r\n`);
      } else {
        term.writeln('\x1b[90mStarting local session...\x1b[0m\r\n');
      }

      // 设置一个总的超时保护 (20秒)
      const timeoutId = setTimeout(() => {
        if (document.getElementById('status').textContent === 'Starting...') {
          const err = 'Terminal startup timed out (20s). Check server logs.';
          console.error(err);
          document.getElementById('overlay').innerHTML = `
            <div class="overlay-content">
              <h2 class="overlay-title" style="color:var(--status-error)">✕ Timeout</h2>
              <p style="color:var(--text);margin-bottom:16px;">The terminal took too long to start. This usually means the backend is stuck or blocked.</p>
              <button class="btn btn-primary btn-block" onclick="location.reload()">Retry</button>
            </div>
          `;
        }
      }, 20000);

      try {
        console.log('[Terminal] Requesting session start...');
        document.getElementById('status').textContent = 'Starting...';

        // 启动终端会话
        const endpoint = getStartEndpoint();
        const startResponse = await fetch(endpoint, { method: 'POST' });
        if (!startResponse.ok) {
          throw new Error('Server failed to start terminal: ' + startResponse.statusText);
        }
        await startResponse.json();

        console.log('[Terminal] Session started on server, connecting WebSocket...');
        term.writeln('\x1b[90mSession started, connecting...\x1b[0m\r\n');

        // 连接WebSocket
        const wsUrl = getWebSocketUrl();
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
          clearTimeout(timeoutId);
          console.log('[Terminal] WebSocket connected.');
          document.getElementById('dot').className = 'dot connected';
          document.getElementById('status').textContent = 'Connected';
          document.getElementById('overlay').classList.add('hidden');
          term.writeln('\x1b[32m✓ Connected\x1b[0m\r\n');
          term.focus();
          
          // 发送初始尺寸
          handleResize();
        };

        ws.onmessage = e => {
          try {
            const msg = JSON.parse(e.data);
            if (msg.type === 'output') term.write(msg.data);
            else if (msg.type === 'waiting') term.writeln(`\x1b[90m${msg.data}\x1b[0m\r\n`);
            else if (msg.type === 'exit') {
              term.writeln(`\r\n\x1b[33m⚠ Terminal exited with code ${msg.code}\x1b[0m`);
              document.getElementById('dot').className = 'dot';
              document.getElementById('status').textContent = 'Exited';
            } else if (msg.type === 'error') {
              term.writeln(`\r\n\x1b[31m✕ Error: ${msg.data}\x1b[0m`);
            }
          } catch (e) {
            // Fallback for non-JSON data
            term.write(e.data);
          }
        };

        ws.onclose = () => {
          clearTimeout(timeoutId);
          console.log('[Terminal] WebSocket closed.');
          document.getElementById('dot').className = 'dot';
          document.getElementById('status').textContent = 'Disconnected';
          term.writeln('\r\n\x1b[31m✗ Disconnected\x1b[0m');
        };

        ws.onerror = err => {
          console.error('[Terminal] WebSocket error:', err);
          document.getElementById('status').textContent = 'Error';
        };

        term.onData(data => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'input', data }));
          }
        });

      } catch (err) {
        clearTimeout(timeoutId);
        console.error('[Terminal] Startup error:', err);
        document.getElementById('overlay').innerHTML = `
          <div class="overlay-content">
            <h2 class="overlay-title" style="color:var(--status-error)">✕ Error</h2>
            <div class="info-card">
              <p style="color:var(--text);margin-bottom:16px;">${err.message || 'Failed to start session'}</p>
            </div>
            <button class="btn btn-primary btn-block" onclick="location.reload()">Retry</button>
            <button class="btn btn-secondary btn-block" onclick="window.location.href='/'" style="margin-top:8px;">Back to Sessions</button>
          </div>
        `;
      }
    }

    // 加载 session 信息
    async function loadSessionInfo() {
      // Parse session context from URL
      parseSessionUrl();
      const { type, serverId, sessionId } = sessionContext;
      const id = sessionId;

      if (id) {
        document.title = `ClaudePad // Terminal: ${id.slice(0, 8)}`;
        document.getElementById('stat-id').textContent = id.slice(0, 8) + '...';
        document.getElementById('resume-command').textContent = `claude --resume ${id}`;
      } else {
        document.title = `ClaudePad // Terminal`;
      }

      // For remote sessions, show remote-specific info without API fetch
      if (type === 'remote') {
        showRemoteInfo();
        return;
      }

      if (!id) {
        showGenericInfo();
        return;
      }

      try {
        const response = await fetch(`/api/sessions/${id}`);
        if (!response.ok) {
          // Session not found, show generic info
          showGenericInfo();
          return;
        }
        const data = await response.json();

        // 更新页面元素中的session信息
        document.getElementById('stat-name').textContent = data.name || 'Unnamed Session';

        // 状态显示
        const statusEl = document.getElementById('stat-status');
        const dot = document.getElementById('dot');
        if (data.status === 'running') {
          statusEl.textContent = '● Running';
          statusEl.style.color = 'var(--status-active)';
          dot.style.background = 'var(--status-active)';
          dot.style.boxShadow = '0 0 8px var(--status-active)';
          // 添加脉冲动画
          dot.style.animation = 'pulse 2s ease-in-out infinite';
        } else if (data.status === 'completed') {
          statusEl.textContent = '✓ Completed';
          statusEl.style.color = 'var(--status-done)';
          dot.style.background = 'var(--status-done)';
          dot.style.boxShadow = 'none';
          dot.style.animation = 'none';
        } else if (data.status === 'idle') {
          statusEl.textContent = '● Idle';
          statusEl.style.color = 'var(--status-pending)';
          dot.style.background = 'var(--status-pending)';
          dot.style.boxShadow = 'none';
          dot.style.animation = 'none';
        } else {
          statusEl.textContent = (data.status || 'Unknown').toUpperCase();
          statusEl.style.color = 'var(--text-muted)';
          dot.style.background = 'var(--text-muted)';
          dot.style.boxShadow = 'none';
          dot.style.animation = 'none';
        }

        if (data.startTime) document.getElementById('stat-started').textContent = new Date(data.startTime).toLocaleString();
        if (data.duration !== undefined) document.getElementById('stat-duration').textContent = formatDuration(data.duration);
        // Use data.id if available, fallback to id from URL
        document.getElementById('resume-command').textContent = `claude --resume ${data.id || id}`;
      } catch (err) {
        console.error('Failed to load session info:', err);
        showGenericInfo();
      }
    }

    // Display remote session info (when connecting to remote server via SSH)
    function showRemoteInfo() {
      const { serverId, sessionId } = sessionContext;
      const id = sessionId || 'UNKNOWN';
      document.getElementById('stat-id').textContent = id.length > 8 ? id.slice(0, 8) + '...' : id;
      document.getElementById('stat-name').textContent = `Remote on ${serverId || 'Unknown Server'}`;
      document.getElementById('stat-status').textContent = '● Remote';
      document.getElementById('stat-status').style.color = 'var(--cyan)';
      document.getElementById('stat-started').textContent = '-';
      document.getElementById('stat-duration').textContent = '-';
      document.getElementById('resume-command').textContent = `claude --resume ${id}`;

      // Update overlay title to indicate remote session
      const titleEl = document.querySelector('.overlay-title');
      if (titleEl) {
        titleEl.innerHTML = '◈ Remote Terminal';
      }

      // Update dot to show remote status
      const dot = document.getElementById('dot');
      dot.style.background = 'var(--cyan)';
      dot.style.boxShadow = '0 0 8px var(--cyan)';
    }

    // 显示通用信息（当 session 不存在时）
    function showGenericInfo() {
      const id = sessionContext.sessionId || location.pathname.split('/').pop() || 'UNKNOWN';
      document.getElementById('stat-id').textContent = id.length > 8 ? id.slice(0, 8) + '...' : id;
      document.getElementById('stat-name').textContent = 'Session not found';
      document.getElementById('stat-status').textContent = 'Unknown';
      document.getElementById('stat-status').style.color = 'var(--text-muted)';
      document.getElementById('stat-started').textContent = '-';
      document.getElementById('stat-duration').textContent = '-';
      document.getElementById('resume-command').textContent = `claude --resume ${id}`;
    }

    function formatDuration(seconds) {
      if (!seconds && seconds !== 0) return '-';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    // 页面加载完成后加载session信息
    document.addEventListener('DOMContentLoaded', function() {
      loadSessionInfo();
    });
  </script>
</body>
</html>
