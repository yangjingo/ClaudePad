<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClaudePad | Terminal</title>
  <link rel="icon" type="image/png" href="/asserts/zelda-icon/link.png" />
  <link rel="stylesheet" href="/asserts/lib/xterm/xterm.css" />
  <script src="/asserts/lib/xterm/xterm.js"></script>
  <script src="/asserts/lib/xterm/addon-fit.js"></script>
  <style>
    /* ============================================
     * SHEIKAH SLATE THEME
     * Ancient Futurism - Bronze & Cyan
     * ============================================ */
    :root {
      /* Background - Sheikah Slate colors */
      --slate-bg: #0a0a0f;
      --slate-bg-light: #111118;
      --slate-bg-lighter: #1a1a24;
      --slate-panel: #13131a;

      /* Bronze/Copper Ancient Metal */
      --bronze: #8B7355;
      --bronze-light: #A0826D;
      --bronze-dark: #6b5b4f;
      --bronze-dim: #4a3f37;

      /* Cyan Glow - Tech Energy */
      --cyan: #00d4ff;
      --cyan-bright: #00f0ff;
      --cyan-dim: #00a8cc;
      --cyan-glow: rgba(0, 212, 255, 0.3);

      /* Text */
      --text: #e0e0e0;
      --text-muted: #888;
      --text-dark: #666;

      /* Status Colors */
      --status-active: #00d4ff;
      --status-done: #4ade80;
      --status-error: #ef4444;
      --status-pending: #666;

      /* Typography */
      --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      /* Spacing */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;

      /* Border Radius */
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
      --radius-full: 9999px;
    }

    /* ============================================
     * Reset & Base
     * ============================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--slate-bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ============================================
     * Header / Navigation
     * ============================================ */
    .header {
      background: var(--slate-bg-light);
      border-bottom: 1px solid var(--bronze-dim);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .back {
      color: var(--cyan);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--bronze-dim);
      transition: all 0.2s;
    }

    .back:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 10px var(--cyan-glow);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      color: var(--cyan);
      font-size: 1.5rem;
      text-shadow: 0 0 10px var(--cyan-glow);
    }

    .logo-text {
      font-family: var(--font-mono);
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--bronze-light);
    }

    .status { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-family: var(--font-mono); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
    .dot.connected { background: var(--status-done); box-shadow: 0 0 8px var(--status-done); }

    /* ============================================
     * Overlay
     * ============================================ */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 15, 0.98);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(10px);
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 1;
    }

    .overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-content {
      background: var(--slate-panel);
      border: 1px solid var(--bronze);
      border-radius: var(--radius-lg);
      padding: 32px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 20px var(--cyan-glow);
      animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .boot-overlay-content {
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      padding: 0;
      width: 100vw;
      max-width: none;
      height: 100vh;
      animation: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .overlay-title {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* ============================================
     * Info Card
     * ============================================ */
    .info-card {
      background: var(--slate-bg-light);
      border: 1px solid var(--bronze-dim);
      border-radius: var(--radius-md);
      padding: 16px;
      margin: 16px 0;
      text-align: left;
    }

    .info-card h3 {
      color: var(--bronze-light);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .info-card .stat {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--bronze-dim);
      font-size: 0.8rem;
    }

    .info-card .stat:last-child {
      border-bottom: none;
    }

    .info-card .stat-label {
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.75rem;
    }

    .info-card .stat-value {
      color: var(--text);
      font-family: var(--font-mono);
      text-align: right;
      word-break: break-all;
      max-width: 60%;
    }

    .info-card code {
      display: block;
      background: rgba(0, 212, 255, 0.1);
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--bronze-dim);
      font-size: 0.8rem;
      color: var(--cyan);
      word-break: break-all;
      font-family: var(--font-mono);
      margin: 8px 0;
    }

    .info-card p {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin: 8px 0;
    }

    /* ============================================
     * Buttons
     * ============================================ */
    .btn {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: transparent;
      color: var(--cyan);
      box-shadow: inset 0 0 0 1px var(--cyan-dim);
    }

    .btn-primary:hover {
      background: var(--cyan-glow);
      box-shadow: inset 0 0 0 1px var(--cyan), 0 0 20px var(--cyan-glow);
    }

    .btn-secondary {
      background: transparent;
      color: var(--bronze-light);
      box-shadow: inset 0 0 0 1px var(--bronze-dim);
      font-size: 0.8rem;
      padding: 6px 12px;
    }

    .btn-secondary:hover {
      color: var(--cyan);
      box-shadow: inset 0 0 0 1px var(--cyan-dim);
    }

    .btn-block {
      width: 100%;
      justify-content: center;
      padding: 10px 20px;
      font-weight: 600;
    }

    /* ============================================
     * Spinner
     * ============================================ */
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--bronze-dim);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .boot-sequence {
      position: relative;
      border: none;
      border-radius: 0;
      background: transparent;
      padding: 0;
      width: min(96vw, 1200px);
      height: min(72vh, 680px);
      min-height: 420px;
      overflow: hidden;
      box-shadow: none;
      animation: screenFlicker 160ms infinite;
    }

    .boot-sequence::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.22) 50%),
                  linear-gradient(90deg, rgba(255, 0, 0, 0.045), rgba(0, 255, 255, 0.025), rgba(0, 110, 255, 0.045));
      background-size: 100% 4px, 6px 100%;
      opacity: 0.55;
    }

    .boot-output {
      margin: 0;
      white-space: pre;
      line-height: 1.18;
      font-size: clamp(14px, 1.6vw, 20px);
      text-align: left;
      color: var(--text);
      text-shadow: 0 0 2px rgba(255, 255, 255, 0.06);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transform-origin: center center;
      z-index: 1;
      will-change: transform;
    }

    .boot-monitor {
      margin-top: 12px;
      font-size: 0.72rem;
      color: var(--text-dark);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      position: relative;
      z-index: 1;
    }

    .boot-cyan {
      color: var(--cyan-bright);
      text-shadow: 0 0 6px var(--cyan-glow);
    }

    .boot-gray {
      color: #5f7777;
    }

    .boot-red {
      color: #ff5d5d;
      text-shadow: 0 0 5px rgba(255, 93, 93, 0.45);
    }

    .boot-footer {
      width: min(96vw, 1200px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
    }

    .boot-progress {
      width: min(420px, 62vw);
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      position: relative;
    }

    .boot-progress-fill {
      width: 38%;
      height: 100%;
      background: linear-gradient(90deg, rgba(0, 212, 255, 0.08), rgba(0, 212, 255, 0.92), rgba(170, 244, 255, 0.18));
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.28);
      animation: bootProgressSweep 3.4s ease-in-out infinite;
    }

    .boot-progress-fill.fast {
      width: 52%;
      animation-duration: 1.7s;
    }

    .boot-tip {
      min-height: 1.1rem;
      font-family: var(--font-mono);
      font-size: 0.76rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-align: center;
    }

    .boot-tip.fast {
      color: var(--cyan);
    }

    @keyframes screenFlicker {
      0% { opacity: 0.97; }
      5% { opacity: 0.86; }
      10% { opacity: 0.96; }
      100% { opacity: 1; }
    }

    @keyframes bootProgressSweep {
      0% { transform: translateX(-110%); opacity: 0.4; }
      50% { opacity: 1; }
      100% { transform: translateX(280%); opacity: 0.55; }
    }

    .hidden { display: none !important; }

    /* ============================================
     * Terminal Container
     * ============================================ */
    #terminal {
      height: calc(100vh - 50px);
      padding: 16px;
    }

    /* ============================================
     * Nav Links
     * ============================================ */
    .nav-links {
      display: flex;
      gap: 12px;
    }

    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }

    .nav-link:hover {
      color: var(--cyan);
      background: var(--cyan-glow);
    }

    .nav-link.active {
      color: var(--cyan);
      border: 1px solid var(--cyan-dim);
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="/" class="back">← Back</a>
    <div class="logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">ClaudePad</span>
    </div>
    <div class="nav-links">
      <a href="/" class="nav-link">Sessions</a>
      <a href="/idea.html" class="nav-link">Ideas</a>
      <a href="/tips.html" class="nav-link">Tips</a>
    </div>
    <div class="status"><span class="dot" id="dot"></span><span id="status">Ready</span></div>
  </div>

  <div id="terminal"></div>

  <div class="overlay" id="overlay">
    <div class="overlay-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 class="overlay-title" style="margin:0;">◈ Terminal Guide</h2>
        <button class="btn btn-secondary" onclick="closeOverlay()" style="padding:4px 8px;font-size:0.75rem;">✕ Close</button>
      </div>

      <div class="info-card">
        <h3>📋 Session Information</h3>
        <div class="stat">
          <span class="stat-label">Session ID:</span>
          <span class="stat-value" id="stat-id">-</span>
        </div>
        <div class="stat">
          <span class="stat-label">Session Name:</span>
          <span class="stat-value" id="stat-name">-</span>
        </div>
        <div class="stat">
          <span class="stat-label">Status:</span>
          <span class="stat-value" id="stat-status" style="color:var(--cyan);">-</span>
        </div>
        <div class="stat">
          <span class="stat-label">Started:</span>
          <span class="stat-value" id="stat-started">-</span>
        </div>
        <div class="stat">
          <span class="stat-label">Duration:</span>
          <span class="stat-value" id="stat-duration">-</span>
        </div>
      </div>

      <div class="info-card">
        <h3>🚀 How to Resume</h3>
        <p style="margin-bottom:12px;">Run this command in your terminal:</p>
        <code id="resume-command">claude --resume xxx</code>
        <div style="display:flex;gap:8px;margin-top:12px;">
          <button class="btn btn-secondary" onclick="copyCommand()" style="flex:1;">📋 Copy</button>
          <button class="btn btn-secondary" onclick="openInExternalTerminal()" style="flex:1;">📂 Open Terminal</button>
        </div>
      </div>

      <button class="btn btn-primary btn-block" onclick="startTerminal()">▶️ Start in Browser</button>
      <p style="margin-top:12px;font-size:0.7rem;color:var(--text-muted);">
        💡 Tip: Starting in browser will run claude --resume in the background
      </p>
    </div>
  </div>

  <script>
    // Session context (local vs remote)
    let sessionContext = {
      type: 'local', // 'local' or 'remote'
      serverId: null,
      sessionId: null
    };

    // ============================================
    // Sheikah Sound Effects System
    // ============================================
    let audioCtx = null;
    let humOscillator = null;
    let humGainNode = null;
    let bootAnimating = false;
    let terminalStarting = false;
    let bootPosX = 0;
    let bootPosY = 0;
    let bootPhase = 0;
    let bootTwist = 0;
    let bootTipTimer = null;
    let bootTipIndex = 0;
    let bootFastPath = false;

    function ensureAudioContext() {
      if (!audioCtx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return null;
        audioCtx = new AudioContext();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playSound(type) {
      const ctx = ensureAudioContext();
      if (!ctx) return;
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);
      const now = ctx.currentTime;

      if (type === 'select') {
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(880, now);
        oscillator.frequency.exponentialRampToValueAtTime(440, now + 0.1);
        gainNode.gain.setValueAtTime(0.05, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        oscillator.start(now);
        oscillator.stop(now + 0.1);
      } else if (type === 'success') {
        oscillator.type = 'triangle';
        oscillator.frequency.setValueAtTime(440, now);
        oscillator.frequency.setValueAtTime(660, now + 0.08);
        oscillator.frequency.setValueAtTime(880, now + 0.16);
        gainNode.gain.setValueAtTime(0.05, now);
        gainNode.gain.linearRampToValueAtTime(0.01, now + 0.3);
        oscillator.start(now);
        oscillator.stop(now + 0.3);
      }
    }

    function playKeystroke() {
      const ctx = ensureAudioContext();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gainNode = ctx.createGain();
      const now = ctx.currentTime;

      osc.type = 'square';
      osc.frequency.setValueAtTime(360 + Math.random() * 360, now);
      gainNode.gain.setValueAtTime(0.016, now);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.03);

      osc.connect(gainNode);
      gainNode.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.04);
    }

    function playGlitch() {
      const ctx = ensureAudioContext();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gainNode = ctx.createGain();
      const now = ctx.currentTime;

      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(120 + Math.random() * 190, now);
      gainNode.gain.setValueAtTime(0.035, now);
      gainNode.gain.linearRampToValueAtTime(0, now + 0.08);

      osc.connect(gainNode);
      gainNode.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.08);
    }

    function startHum() {
      const ctx = ensureAudioContext();
      if (!ctx || humOscillator) return;
      humOscillator = ctx.createOscillator();
      humGainNode = ctx.createGain();
      humOscillator.type = 'sine';
      humOscillator.frequency.setValueAtTime(55, ctx.currentTime);
      humGainNode.gain.setValueAtTime(0, ctx.currentTime);
      humGainNode.gain.linearRampToValueAtTime(0.06, ctx.currentTime + 0.6);
      humOscillator.connect(humGainNode);
      humGainNode.connect(ctx.destination);
      humOscillator.start();
    }

    function stopHum() {
      if (!audioCtx || !humOscillator || !humGainNode) return;
      const stopAt = audioCtx.currentTime + 0.2;
      humGainNode.gain.cancelScheduledValues(audioCtx.currentTime);
      humGainNode.gain.linearRampToValueAtTime(0.001, stopAt);
      humOscillator.stop(stopAt + 0.02);
      humOscillator = null;
      humGainNode = null;
    }

    function stopBootAnimation() {
      bootAnimating = false;
      bootFastPath = false;
      stopHum();
      if (bootTipTimer) {
        clearInterval(bootTipTimer);
        bootTipTimer = null;
      }
      const outputEl = document.getElementById('boot-output');
      if (outputEl) outputEl.style.transform = 'translate(-50%, -50%) translate(0px, 0px) scale(1) rotate(0deg)';
    }

    function setBootFastPath(enabled) {
      bootFastPath = !!enabled;
      const progressEl = document.querySelector('.boot-progress-fill');
      if (progressEl) progressEl.classList.toggle('fast', bootFastPath);
      const tipEl = document.getElementById('boot-tip');
      if (tipEl) {
        tipEl.classList.toggle('fast', bootFastPath);
        if (bootFastPath) {
          tipEl.textContent = 'Tip: Trusted workspace cache hit. Fast-path resuming...';
        }
      }
    }

    // 定义全局函数供HTML调用
    function closeOverlay() {
      playSound('select');
      window.location.href = '/';
    }

    function copyCommand() {
      playSound('select');
      const cmd = getResumeCommand();
      navigator.clipboard.writeText(cmd).then(() => {
        const btn = document.querySelector('button[onclick="copyCommand()"]');
        const originalText = btn.textContent;
        btn.textContent = '✓ Copied!';
        setTimeout(() => btn.textContent = originalText, 2000);
      });
    }

    function openInExternalTerminal() {
      const cmd = getResumeCommand();
      navigator.clipboard.writeText(cmd).then(() => {
        alert('Command copied! Open your terminal and paste the command to run.');
      });
    }

    function getResumeCommand() {
      const { type, serverId, sessionId } = sessionContext;
      const id = sessionId || 'SESSION_ID';
      if (type === 'remote' && serverId) {
        return `ssh ${serverId} "claude --resume ${id}"`;
      }
      return `claude --resume ${id}`;
    }

    const GOLEM_ASCII_DATA = [
`{G}
        ___
      _// \\_
     ||  |  ||
     //  |  \\\\
    //_  |  _\\\\
   ||_||-||-||_||
   //   // \\\\   \\\\
  ||  _||   ||_  ||
  ||_//  \\_/  \\\\_||
   \\_//   ||   \\\\_/
          ||
{/G}`,
`{G}
        ___
      _// \\_
     || {C}.{/C}| {C}.{/C}||
     //  |  \\\\
    //_  |  _\\\\
   ||_{C}@{/C}||-||-||_{C}@{/C}||
   //   // \\\\   \\\\
  ||  _{C}O{/C}||   ||_  ||
  ||_//  \\_/  \\\\_||
   \\_//   ||   \\\\_/
          ||
{/G}`,
`{G}
        ___
      _// \\_
     || {C}O{/C}| {C}O{/C}||
     //  |  \\\\
    //_  |  _\\\\
   ||_{C}@@{/C}||-||-||_{C}@@{/C}||
   //   // \\\\   \\\\
  ||  _{C}X{/C}||   ||_  ||
  ||_{C}#{/C}//  \\_/  \\\\_{C}#{/C}||
   \\_// {C}*{/C} || {C}*{/C} \\\\_/
          ||
{/G}`,
`{G}
        ___
      _// \\_
     || {C}O{/C}| {C}O{/C}||
     // {C}011001{/C}\\\\
    //_  |  _\\\\
   ||_{C}@@{/C}||-||-||_{C}@@{/C}||
   // {C}v1.3{/C}// \\\\ {C}scan{/C} \\\\
  ||  _{C}X{/C}||   ||_  ||
  ||_{C}#{/C}//  \\_/  \\\\_{C}#{/C}||
   \\_{C}::{/C}//   ||   \\\\_{C}::{/C}/
          ||
{/G}`
    ];

    const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

    function applyBootColors(text) {
      return text
        .replace(/{C}/g, '<span class="boot-cyan">')
        .replace(/{\/C}/g, '</span>')
        .replace(/{G}/g, '<span class="boot-gray">')
        .replace(/{\/G}/g, '</span>')
        .replace(/{R}/g, '<span class="boot-red">')
        .replace(/{\/R}/g, '</span>');
    }

    function renderBootFrame(outputEl, frameText) {
      outputEl.innerHTML = applyBootColors(frameText);
    }

    function rotateBootTips() {
      const tips = bootFastPath
        ? [
            'Tip: Trusted workspace cache hit. Fast-path resuming...',
            'Tip: Reusing prior workspace trust to reduce friction.',
            'Tip: Waiting for Claude bootstrap output...'
          ]
        : [
            'Tip: Waiting for remote shell handshake...',
            'Tip: If project path is gone, fallback to $HOME is automatic.',
            'Tip: First response can take a few seconds on cold sessions.',
            'Tip: Keep this window focused for faster input handoff.',
            'Tip: WebSocket is live, waiting for Claude bootstrap output...'
          ];
      const tipEl = document.getElementById('boot-tip');
      if (!tipEl) return;
      tipEl.textContent = tips[bootTipIndex % tips.length];
      bootTipIndex++;
    }

    async function playBootSequence() {
      const outputEl = document.getElementById('boot-output');
      if (!outputEl) return;

      bootPosX = 0;
      bootPosY = 0;
      bootPhase = Math.random() * Math.PI * 2;
      bootTwist = 0;
      bootTipIndex = 0;
      rotateBootTips();
      bootTipTimer = setInterval(rotateBootTips, bootFastPath ? 1100 : 2200);
      startHum();
      const frameOrder = [0, 1, 2, 3, 2, 1];
      while (bootAnimating) {
        for (const idx of frameOrder) {
          if (!bootAnimating) break;
          bootPhase += 0.085;
          const stageEl = document.querySelector('.boot-sequence');
          const boxW = outputEl.offsetWidth || 1;
          const boxH = outputEl.offsetHeight || 1;
          const stageW = stageEl ? stageEl.clientWidth : 500;
          const stageH = stageEl ? stageEl.clientHeight : 420;
          const limitX = Math.max(14, (stageW - boxW) * 0.5 * 0.9);
          const limitY = Math.max(12, (stageH - boxH) * 0.5 * 0.9);

          const targetX = (Math.sin(bootPhase * 0.73) * 0.72 + Math.sin(bootPhase * 0.17) * 0.28) * limitX;
          const targetY = (Math.cos(bootPhase * 0.59) * 0.75 + Math.sin(bootPhase * 0.29) * 0.25) * limitY;
          const targetScale = 1 + Math.sin(bootPhase * 0.43) * 0.045;
          const targetTwist = Math.sin(bootPhase * 0.35) * 1.8 + Math.cos(bootPhase * 0.11) * 0.6;
          bootPosX += (targetX - bootPosX) * 0.22;
          bootPosY += (targetY - bootPosY) * 0.22;
          bootTwist += (targetTwist - bootTwist) * 0.18;
          outputEl.style.transform = `translate(-50%, -50%) translate(${bootPosX.toFixed(2)}px, ${bootPosY.toFixed(2)}px) scale(${targetScale.toFixed(3)}) rotate(${bootTwist.toFixed(2)}deg)`;
          if (idx !== 0) playKeystroke();
          if (Math.random() > 0.62) playGlitch();
          renderBootFrame(outputEl, GOLEM_ASCII_DATA[idx]);
          await sleep((bootFastPath ? 80 : 140) + Math.random() * (bootFastPath ? 35 : 60));
        }
      }
    }

    async function startTerminal() {
      if (terminalStarting) return;
      if (!sessionContext.sessionId) {
        alert('Error: No session ID found in URL. Cannot start terminal.');
        return;
      }
      terminalStarting = true;

      const overlay = document.getElementById('overlay');
      playSound('select');
      stopBootAnimation();
      overlay.innerHTML = `
        <div class="overlay-content boot-overlay-content">
          <div class="boot-sequence">
            <pre id="boot-output" class="boot-output"></pre>
          </div>
          <div class="boot-footer">
            <div class="boot-progress"><div class="boot-progress-fill"></div></div>
            <div id="boot-tip" class="boot-tip"></div>
          </div>
        </div>
      `;

      bootAnimating = true;
      setBootFastPath(false);
      playBootSequence().catch(() => {});
      if (!overlay || overlay.classList.contains('hidden')) {
        stopBootAnimation();
        terminalStarting = false;
        return;
      }
      initTerminal().finally(() => {
        terminalStarting = false;
      });
    }

    // Parse URL to determine session type and IDs
    function parseSessionUrl() {
      const path = location.pathname;
      const searchParams = new URLSearchParams(location.search);
      
      const qSessionId = searchParams.get('sessionId');
      const qServerId = searchParams.get('serverId');

      if (qSessionId) {
        sessionContext = {
          type: qServerId ? 'remote' : 'local',
          serverId: qServerId,
          sessionId: qSessionId
        };
        return sessionContext;
      }

      // Local session: /terminal/:sessionId
      // Remote session: /terminal/:serverId/:sessionId
      const parts = path.split('/').filter(p => p);

      if (parts.length >= 2 && parts[0] === 'terminal') {
        if (parts.length === 2) {
          // Local session
          sessionContext = {
            type: 'local',
            serverId: null,
            sessionId: parts[1]
          };
        } else if (parts.length >= 3) {
          // Remote session
          sessionContext = {
            type: 'remote',
            serverId: parts[1],
            sessionId: parts[2]
          };
        }
      }
      return sessionContext;
    }

    // Get the appropriate API endpoint for starting the terminal
    function getStartEndpoint() {
      const { serverId, sessionId } = sessionContext;
      if (sessionContext.type === 'remote') {
        return `/api/servers/${serverId}/sessions/${sessionId}/terminal`;
      }
      return `/api/sessions/${sessionId}/terminal`;
    }

    // Get the appropriate WebSocket URL
    function getWebSocketUrl() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const host = location.host;
      const { serverId, sessionId } = sessionContext;
      if (sessionContext.type === 'remote') {
        return `${protocol}//${host}/ws/ssh/${serverId}/${sessionId}`;
      }
      return `${protocol}//${host}/ws/terminal/${sessionId}`;
    }

    // 初始化终端
    async function initTerminal() {
      console.log('[Terminal] Initializing...');
      // Parse session context from URL
      parseSessionUrl();
      const { type, serverId, sessionId } = sessionContext;
      
      if (!sessionId) {
        console.error('[Terminal] No session ID provided');
        alert('Error: No session ID found.');
        return;
      }

      // 检查库是否加载
      if (typeof window.Terminal === 'undefined') {
        const err = 'Error: xterm.js library not loaded yet. Please refresh the page.';
        console.error(err);
        alert(err);
        return;
      }

      const id = sessionId;

      // 初始化 xterm.js
      const term = new window.Terminal({
        cursorBlink: true,
        fontSize: 14,
        fontFamily: '"SF Mono", "Fira Code", Consolas, monospace',
        theme: {
          background: '#0a0a0f',
          foreground: '#e0e0e0',
          cursor: '#00d4ff',
          selection: 'rgba(0, 212, 255, 0.3)'
        }
      });

      // 兼容不同的 FitAddon 加载方式
      let fit;
      try {
        if (window.FitAddon && window.FitAddon.FitAddon) {
          fit = new window.FitAddon.FitAddon();
        } else if (window.FitAddon) {
          fit = new window.FitAddon();
        }
        
        if (fit) {
          term.loadAddon(fit);
        }
      } catch (e) {
        console.warn('[Terminal] FitAddon failed to load:', e);
      }

      term.open(document.getElementById('terminal'));
      if (fit) fit.fit();

      let ws = null;
      let resumeOraTimer = null;
      let resumeOraFrame = 0;
      let resumeOraActive = false;
      let resumeOutputArrived = false;
      let wsConnectedAt = 0;
      const resumeOraFrames = [
        '[>........]',
        '[=>.......]',
        '[==>......]',
        '[===>.....]',
        '[====>....]',
        '[=====>...]',
        '[======>..]',
        '[=======>.]',
        '[========>]',
        '[.=======>]'
      ];
      const shortSessionId = (id || '').slice(0, 8) || 'unknown';
      let resumeOraLabel = `[CORE/RESUME::${shortSessionId.toUpperCase()}]`;
      const uiTraceId = `${type}:${serverId || 'local'}:${id || 'unknown'}`;

      function startResumeOra(label = resumeOraLabel) {
        if (resumeOraActive) return;
        resumeOraLabel = label;
        resumeOraActive = true;
        term.write(`\x1b[36m${resumeOraLabel}\x1b[0m \x1b[90m${resumeOraFrames[0]}\x1b[0m`);
        resumeOraTimer = setInterval(() => {
          if (!resumeOraActive) return;
          resumeOraFrame = (resumeOraFrame + 1) % resumeOraFrames.length;
          term.write(`\r\x1b[36m${resumeOraLabel}\x1b[0m \x1b[90m${resumeOraFrames[resumeOraFrame]}\x1b[0m`);
        }, 80);
      }

      function stopResumeOra(doneText = '') {
        if (!resumeOraActive) return;
        resumeOraActive = false;
        if (resumeOraTimer) {
          clearInterval(resumeOraTimer);
          resumeOraTimer = null;
        }
        term.write('\r\x1b[2K');
        if (doneText) term.writeln(`\x1b[90m${doneText}\x1b[0m`);
      }

      function markResumeReady() {
        if (resumeOutputArrived) return;
        resumeOutputArrived = true;
        const tNow = performance.now();
        let doneLine = '[CORE LINK STABLE]';
        if (wsConnectedAt > 0) {
          const elapsed = (tNow - wsConnectedAt).toFixed(1);
          console.log(`[Perf][UI][${uiTraceId}] first_output_after_connected=${elapsed}ms`);
          doneLine = `[CORE LINK STABLE ${elapsed}ms]`;
        }
        stopResumeOra(doneLine);
        document.getElementById('status').textContent = 'Connected';
      }

      function handleResize() {
        if (fit) fit.fit();
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ 
            type: 'resize', 
            cols: term.cols, 
            rows: term.rows 
          }));
        }
      }

      window.addEventListener('resize', handleResize);

      term.writeln('\x1b[36m◈ ClaudePad Terminal\x1b[0m');
      if (type === 'remote') {
        term.writeln(`\x1b[90mConnecting to remote session on ${serverId}...\x1b[0m\r\n`);
      } else {
        term.writeln('\x1b[90mStarting local session...\x1b[0m\r\n');
      }

      // 设置一个总的超时保护。现在远端启动会尽快返回，这里只兜底真正卡死的情况。
      const timeoutId = setTimeout(() => {
        if (document.getElementById('status').textContent === 'Starting...') {
          const err = 'Terminal startup timed out (12s). Check server logs.';
          console.error(err);
          stopBootAnimation();
          document.getElementById('overlay').innerHTML = `
            <div class="overlay-content">
              <h2 class="overlay-title" style="color:var(--status-error)">✕ Timeout</h2>
              <p style="color:var(--text);margin-bottom:16px;">The terminal took too long to start. This usually means the backend is stuck or blocked.</p>
              <button class="btn btn-primary btn-block" onclick="location.reload()">Retry</button>
            </div>
          `;
        }
      }, 12000);

      try {
        console.log('[Terminal] Requesting session start...');
        document.getElementById('status').textContent = 'Starting...';

        // 启动终端会话
        const endpoint = getStartEndpoint();
        const startResponse = await fetch(endpoint, { method: 'POST' });
        if (!startResponse.ok) {
          let details = startResponse.statusText;
          try {
            const payload = await startResponse.json();
            details = payload.details || payload.error || details;
          } catch {}
          throw new Error('Server failed to start terminal: ' + details);
        }
        const startPayload = await startResponse.json();
        if (startPayload && startPayload.trustedWorkspace) {
          setBootFastPath(true);
        }

        console.log('[Terminal] Session started on server, connecting WebSocket...');
        term.writeln('\x1b[90mSession started, connecting...\x1b[0m\r\n');

        // 连接WebSocket
        const wsUrl = getWebSocketUrl();
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
          wsConnectedAt = performance.now();
          clearTimeout(timeoutId);
          stopBootAnimation();
          console.log('[Terminal] WebSocket connected.');
          console.log(`[Perf][UI][${uiTraceId}] ws_connected`);
          document.getElementById('dot').className = 'dot connected';
          document.getElementById('status').textContent = 'Resuming...';
          document.getElementById('overlay').classList.add('hidden');
          term.clear();
          term.writeln('\x1b[36m◈ ClaudePad Terminal\x1b[0m');
          term.writeln('\x1b[32m✓ Connected\x1b[0m');
          term.writeln('');
          startResumeOra();
          term.focus();
          
          // Send size immediately to avoid extra startup latency.
          handleResize();
        };

        ws.onmessage = e => {
          try {
            const msg = JSON.parse(e.data);
            if (msg.type === 'output') {
              term.write(msg.data);
            }
            else if (msg.type === 'resume_ready') {
              markResumeReady();
            }
            else if (msg.type === 'waiting') term.writeln(`\x1b[90m${msg.data}\x1b[0m\r\n`);
            else if (msg.type === 'exit') {
              stopResumeOra();
              term.writeln(`\r\n\x1b[33m⚠ Terminal exited with code ${msg.code}\x1b[0m`);
              document.getElementById('dot').className = 'dot';
              document.getElementById('status').textContent = 'Exited';
            } else if (msg.type === 'error') {
              stopResumeOra();
              term.writeln(`\r\n\x1b[31m✕ Error: ${msg.data}\x1b[0m`);
            }
          } catch (_err) {
            // Fallback for non-JSON payloads
            term.write(e.data || '');
          }
        };

        ws.onclose = () => {
          clearTimeout(timeoutId);
          stopBootAnimation();
          stopResumeOra();
          console.log('[Terminal] WebSocket closed.');
          document.getElementById('dot').className = 'dot';
          document.getElementById('status').textContent = 'Disconnected';
          term.writeln('\r\n\x1b[31m✗ Disconnected\x1b[0m');
        };

        ws.onerror = err => {
          stopResumeOra();
          console.error('[Terminal] WebSocket error:', err);
          document.getElementById('status').textContent = 'Error';
        };

        term.onData(data => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'input', data }));
          }
        });

      } catch (err) {
        clearTimeout(timeoutId);
        stopBootAnimation();
        stopResumeOra();
        console.error('[Terminal] Startup error:', err);
        document.getElementById('overlay').innerHTML = `
          <div class="overlay-content">
            <h2 class="overlay-title" style="color:var(--status-error)">✕ Error</h2>
            <div class="info-card">
              <p style="color:var(--text);margin-bottom:16px;">${err.message || 'Failed to start session'}</p>
            </div>
            <button class="btn btn-primary btn-block" onclick="location.reload()">Retry</button>
            <button class="btn btn-secondary btn-block" onclick="window.location.href='/'" style="margin-top:8px;">Back to Sessions</button>
          </div>
        `;
      }
    }

    // 加载 session 信息
    async function loadSessionInfo() {
      // Parse session context from URL
      parseSessionUrl();
      const { type, serverId, sessionId } = sessionContext;
      const id = sessionId;

      if (id) {
        document.title = `ClaudePad // Terminal: ${id.slice(0, 8)}`;
        document.getElementById('stat-id').textContent = id.slice(0, 8) + '...';
        document.getElementById('resume-command').textContent = `claude --resume ${id}`;
      } else {
        document.title = `ClaudePad // Terminal`;
      }

      // For remote sessions, show remote-specific info without API fetch
      if (type === 'remote') {
        showRemoteInfo();
        return;
      }

      if (!id) {
        showGenericInfo();
        return;
      }

      try {
        const response = await fetch(`/api/sessions/${id}`);
        if (!response.ok) {
          // Session not found, show generic info
          showGenericInfo();
          return;
        }
        const data = await response.json();

        // 更新页面元素中的session信息
        document.getElementById('stat-name').textContent = data.name || 'Unnamed Session';

        // 状态显示
        const statusEl = document.getElementById('stat-status');
        const dot = document.getElementById('dot');
        if (data.status === 'running') {
          statusEl.textContent = '● Running';
          statusEl.style.color = 'var(--status-active)';
          dot.style.background = 'var(--status-active)';
          dot.style.boxShadow = '0 0 8px var(--status-active)';
          // 添加脉冲动画
          dot.style.animation = 'pulse 2s ease-in-out infinite';
        } else if (data.status === 'completed') {
          statusEl.textContent = '✓ Completed';
          statusEl.style.color = 'var(--status-done)';
          dot.style.background = 'var(--status-done)';
          dot.style.boxShadow = 'none';
          dot.style.animation = 'none';
        } else if (data.status === 'idle') {
          statusEl.textContent = '● Idle';
          statusEl.style.color = 'var(--status-pending)';
          dot.style.background = 'var(--status-pending)';
          dot.style.boxShadow = 'none';
          dot.style.animation = 'none';
        } else {
          statusEl.textContent = (data.status || 'Unknown').toUpperCase();
          statusEl.style.color = 'var(--text-muted)';
          dot.style.background = 'var(--text-muted)';
          dot.style.boxShadow = 'none';
          dot.style.animation = 'none';
        }

        if (data.startTime) document.getElementById('stat-started').textContent = new Date(data.startTime).toLocaleString();
        if (data.duration !== undefined) document.getElementById('stat-duration').textContent = formatDuration(data.duration);
        // Use data.id if available, fallback to id from URL
        document.getElementById('resume-command').textContent = `claude --resume ${data.id || id}`;
      } catch (err) {
        console.error('Failed to load session info:', err);
        showGenericInfo();
      }
    }

    // Display remote session info (when connecting to remote server via SSH)
    function showRemoteInfo() {
      const { serverId, sessionId } = sessionContext;
      const id = sessionId || 'UNKNOWN';
      document.getElementById('stat-id').textContent = id.length > 8 ? id.slice(0, 8) + '...' : id;
      document.getElementById('stat-name').textContent = `Remote on ${serverId || 'Unknown Server'}`;
      document.getElementById('stat-status').textContent = '● Remote';
      document.getElementById('stat-status').style.color = 'var(--cyan)';
      document.getElementById('stat-started').textContent = '-';
      document.getElementById('stat-duration').textContent = '-';
      document.getElementById('resume-command').textContent = `claude --resume ${id}`;

      // Update overlay title to indicate remote session
      const titleEl = document.querySelector('.overlay-title');
      if (titleEl) {
        titleEl.innerHTML = '◈ Remote Terminal';
      }

      // Update dot to show remote status
      const dot = document.getElementById('dot');
      dot.style.background = 'var(--cyan)';
      dot.style.boxShadow = '0 0 8px var(--cyan)';
    }

    // 显示通用信息（当 session 不存在时）
    function showGenericInfo() {
      const id = sessionContext.sessionId || location.pathname.split('/').pop() || 'UNKNOWN';
      document.getElementById('stat-id').textContent = id.length > 8 ? id.slice(0, 8) + '...' : id;
      document.getElementById('stat-name').textContent = 'Session not found';
      document.getElementById('stat-status').textContent = 'Unknown';
      document.getElementById('stat-status').style.color = 'var(--text-muted)';
      document.getElementById('stat-started').textContent = '-';
      document.getElementById('stat-duration').textContent = '-';
      document.getElementById('resume-command').textContent = `claude --resume ${id}`;
    }

    function formatDuration(seconds) {
      if (!seconds && seconds !== 0) return '-';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    // 页面加载完成后加载session信息
    document.addEventListener('DOMContentLoaded', function() {
      loadSessionInfo();
    });
  </script>
</body>
