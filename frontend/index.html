<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClaudePad | CC Monitor</title>
  <style>
    /* ============================================
     * SHEIKAH SLATE THEME
     * ============================================ */
    :root {
      --slate-bg: #0a0a0f;
      --slate-bg-light: #111118;
      --slate-bg-lighter: #1a1a24;
      --slate-panel: #13131a;
      --bronze: #8B7355;
      --bronze-light: #A0826D;
      --bronze-dark: #6b5b4f;
      --bronze-dim: #4a3f37;
      --cyan: #00d4ff;
      --cyan-bright: #00f0ff;
      --cyan-dim: #00a8cc;
      --cyan-glow: rgba(0, 212, 255, 0.3);
      --text: #e0e0e0;
      --text-muted: #888;
      --text-dark: #666;
      --status-active: #00d4ff;
      --status-done: #4ade80;
      --status-error: #ef4444;
      --status-pending: #666;
      --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
      --radius-full: 9999px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-sans); background: var(--slate-bg); color: var(--text); min-height: 100vh; line-height: 1.5; }

    /* Header */
    .header { background: var(--slate-bg-light); border-bottom: 1px solid var(--bronze-dim); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon { color: var(--cyan); font-size: 1.5rem; text-shadow: 0 0 10px var(--cyan-glow); }
    .logo-text { font-family: var(--font-mono); font-size: 1.2rem; font-weight: 600; color: var(--bronze-light); }
    .nav-links { display: flex; gap: 12px; }
    .nav-link { color: var(--text-muted); text-decoration: none; font-family: var(--font-mono); font-size: 0.85rem; padding: 6px 12px; border-radius: var(--radius-sm); transition: all 0.2s; }
    .nav-link:hover { color: var(--cyan); background: var(--cyan-glow); }
    .nav-link.active { color: var(--cyan); border: 1px solid var(--cyan-dim); }

    /* Version Badge */
    .version-badge {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      background: var(--slate-bg-lighter);
      border: 1px solid var(--bronze-dim);
      color: var(--bronze-light);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: default; /* Quiet by default */
    }
    .version-badge.update-ready {
      border-color: var(--cyan);
      color: var(--cyan);
      cursor: pointer;
      animation: pulse 2s ease-in-out infinite;
    }
    .version-badge.update-ready:hover { background: var(--cyan-glow); }

    /* Layout Containers */
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
    .panel { background: var(--slate-panel); border: 1px solid var(--bronze-dim); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 24px; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: var(--slate-bg-lighter); border-bottom: 1px solid var(--bronze-dim); }
    .panel-title { font-family: var(--font-mono); font-size: 0.9rem; color: var(--bronze-light); text-transform: uppercase; letter-spacing: 0.1em; display: flex; align-items: center; gap: 8px; }

    /* Session List */
    .session-list { padding: 8px; }
    .session-card { background: var(--slate-bg-light); border: 1px solid var(--bronze-dim); border-radius: var(--radius-md); padding: 16px 20px; margin: 8px; cursor: pointer; transition: all 0.2s; display: flex; justify-content: space-between; align-items: flex-start; }
    .session-card:hover { border-color: var(--cyan-dim); box-shadow: 0 0 20px rgba(0, 212, 255, 0.1); }
    .session-card.remote-session { border-color: var(--cyan-dim); }

    /* Config Bar */
    .config-bar { background: var(--slate-bg-lighter); border-bottom: 1px solid var(--bronze-dim); padding: 12px 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .config-item { display: flex; flex-direction: column; gap: 4px; }
    .config-label { font-size: 0.65rem; color: var(--bronze); text-transform: uppercase; letter-spacing: 0.05em; font-family: var(--font-mono); }
    .config-value { font-size: 0.8rem; color: var(--text); font-family: var(--font-mono); display: flex; align-items: center; gap: 6px; }
    .config-value code { background: rgba(0, 212, 255, 0.1); padding: 2px 6px; border-radius: var(--radius-sm); border: 1px solid var(--bronze-dim); }

    /* Modals */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--slate-panel); border: 1px solid var(--bronze); border-radius: var(--radius-lg); padding: 24px; width: 100%; max-width: 450px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--bronze-dim); }
    .modal-title { font-family: var(--font-mono); font-size: 0.9rem; color: var(--cyan); text-transform: uppercase; letter-spacing: 0.1em; }
    .modal-close { background: transparent; border: 1px solid var(--bronze-dim); color: var(--text-muted); cursor: pointer; font-size: 0.8rem; padding: 4px 10px; border-radius: var(--radius-sm); font-family: var(--font-mono); }

    .btn { font-family: var(--font-mono); font-size: 0.85rem; padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; border: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: transparent; color: var(--cyan); box-shadow: inset 0 0 0 1px var(--cyan-dim); }
    .btn-primary:hover { background: var(--cyan-glow); box-shadow: inset 0 0 0 1px var(--cyan), 0 0 20px var(--cyan-glow); }
    .btn-ghost { background: transparent; color: var(--bronze-light); box-shadow: inset 0 0 0 1px var(--bronze-dim); text-decoration: none; }
    .btn-edit-model { background: transparent; border: 1px solid var(--bronze-dim); color: var(--bronze-light); font-size: 0.7rem; padding: 4px 10px; border-radius: var(--radius-sm); cursor: pointer; font-family: var(--font-mono); }

    /* Elegant Progress UI */
    .update-status-container {
      text-align: center;
      padding: 30px 10px;
    }

    .ora-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--bronze-dim);
      border-top: 3px solid var(--cyan);
      border-left: 3px solid var(--cyan);
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      box-shadow: 0 0 15px var(--cyan-glow);
    }

    .status-step {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--cyan);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .status-sub {
      font-size: 0.75rem;
      color: var(--text-dark);
    }

    /* Remote Discovery UI */
    .scanner-text {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--cyan);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      animation: pulse 1.5s infinite;
    }

    .mini-ora {
      width: 14px;
      height: 14px;
      border: 2px solid var(--bronze-dim);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .stagger-in {
      opacity: 0;
      transform: translateY(5px);
      animation: slideIn 0.3s forwards;
    }

    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Animations */
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--bronze-dim); border-top-color: var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }

    /* Server Tags */
    .server-tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--slate-bg-light); border: 1px solid var(--bronze-dim); border-radius: var(--radius-sm); font-size: 0.85rem; cursor: pointer; }
    .server-status { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
    .server-status.connected { background: var(--status-done); box-shadow: 0 0 6px var(--status-done); }
    .btn-delete-server { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.75rem; }
    .server-sessions { width: 100%; margin-top: 8px; background: var(--slate-bg-lighter); border-radius: var(--radius-sm); padding: 8px; }
    .remote-badge { display: inline-flex; padding: 2px 8px; background: rgba(0, 212, 255, 0.15); color: var(--cyan); border-radius: 3px; font-size: 0.7rem; font-weight: 600; }

    .session-status { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
    .session-status.running { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); animation: pulse 2s ease-in-out infinite; }
  </style>
</head>
<body>
  <header class="header">
    <a href="/" class="logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">ClaudePad</span>
    </a>
    <div style="display: flex; gap: 12px; align-items: center;">
      <div id="version-badge" class="version-badge" onclick="handleBadgeClick()">◈ v...</div>
      <a href="/" class="nav-link active">🐱 Sessions</a>
      <a href="/idea.html" class="nav-link">💡 Ideas</a>
      <a href="/tips.html" class="nav-link">🔧 Tips</a>
      <a href="/playground.html" class="nav-link">🎮 Playground</a>
    </div>
  </header>

  <div class="config-bar">
    <div class="config-item">
      <span class="config-label">◈ Claude Path</span>
      <span class="config-value" id="config-path">Loading...</span>
    </div>
    <div class="config-item">
      <span class="config-label">Model Config</span>
      <div style="display: flex; align-items: center; gap: 8px;">
        <code id="config-model" style="background: rgba(0,212,255,0.1); padding: 2px 6px; border-radius: var(--radius-sm); border: 1px solid var(--bronze-dim); font-size: 0.8rem; color: var(--cyan);">claude-3-5-sonnet-latest</code>
        <button class="btn-edit-model" onclick="openEditModal()">✎ Edit</button>
      </div>
    </div>
    <div class="config-item">
      <span class="config-label">Host / User</span>
      <span class="config-value"><code id="config-host">-</code> | <code id="config-user">-</code></span>
    </div>
  </div>

  <div class="config-bar" style="border-top: none;">
    <div class="config-item" style="grid-column: span 3;">
      <span class="config-label">▣ Remote Servers <button class="btn-edit-model" onclick="openAddServerModal()">+ Add</button></span>
      <div id="servers-list" style="margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px;"></div>
    </div>
  </div>

  <main class="container">
    <section class="panel">
      <div class="panel-header">
        <span class="panel-title">◈ Active Sessions</span>
        <div style="display: flex; gap: 12px; align-items: center; font-size: 0.8rem; color: var(--text-muted);">
          <span id="page-info">Page 1</span>
          <span id="count">-</span>
          <span id="total-duration"></span>
        </div>
      </div>
      <div id="list" class="session-list">
        <div class="loading" style="text-align:center; padding: 40px;"><div class="spinner"></div></div>
      </div>
    </section>
  </main>

  <!-- Update Modal -->
  <div class="modal-overlay" id="update-modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">◈ Update Claude Code</span>
        <button class="modal-close" onclick="closeUpdateModal()">✕</button>
      </div>
      <div style="margin-bottom: 20px;">
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 12px;">New version available. Choose method:</p>
        <div style="background: rgba(0,212,255,0.05); padding: 12px; border-radius: 4px; border: 1px solid var(--bronze-dim); font-size: 0.8rem; font-family: var(--font-mono);">
          Current: <span id="update-current-ver">-</span><br>
          Latest: <span id="update-latest-ver" style="color: var(--cyan);">-</span>
        </div>
      </div>
      <div style="display: flex; flex-direction: column; gap: 10px;">
        <button class="btn btn-primary" onclick="executeUpdate('npm')" style="justify-content: center;">🚀 Update via NPM Mirror</button>
        <button class="btn btn-ghost" onclick="executeUpdate('cli')" style="justify-content: center;">🐚 Update via Official CLI</button>
      </div>
    </div>
  </div>

  <!-- Edit Config Modal -->
  <div class="modal-overlay" id="edit-modal-overlay" onclick="if(event.target === this) closeEditModal()">
    <div class="modal">
      <div class="modal-header"><span class="modal-title">◈ Edit Config</span><button class="modal-close" onclick="closeEditModal()">✕</button></div>
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <input type="text" id="edit-model" class="btn-ghost" style="padding: 10px; width:100%" placeholder="Model">
        <input type="text" id="edit-apiurl" class="btn-ghost" style="padding: 10px; width:100%" placeholder="API URL">
        <input type="password" id="edit-apikey" class="btn-ghost" style="padding: 10px; width:100%" placeholder="API Key">
        <button class="btn btn-primary" onclick="saveConfig()" style="justify-content: center;">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Add Server Modal -->
  <div class="modal-overlay" id="add-server-modal-overlay">
    <div class="modal">
      <div class="modal-header"><span class="modal-title">◈ Add Server</span><button class="modal-close" onclick="closeAddServerModal()">✕</button></div>
      <div style="display: flex; flex-direction: column; gap: 10px;">
        <input type="text" id="add-server-id" class="btn-ghost" style="padding: 8px;" placeholder="Server ID">
        <input type="text" id="add-server-host" class="btn-ghost" style="padding: 8px;" placeholder="Host">
        <input type="text" id="add-server-username" class="btn-ghost" style="padding: 8px;" placeholder="User">
        <input type="password" id="add-server-password" class="btn-ghost" style="padding: 8px;" placeholder="Password">
        <button class="btn btn-primary" onclick="addServer()" style="justify-content: center;">Add Server</button>
      </div>
    </div>
  </div>

  <script>
    let currentConfig = {};
    let pagination = { offset: 0, limit: 20, total: 0 };

    function handleBadgeClick() {
      const badge = document.getElementById('version-badge');
      if (!badge || !badge.classList.contains('update-ready')) return;
      
      const current = badge.dataset.current;
      const latest = badge.dataset.latest;
      
      document.getElementById('update-current-ver').textContent = 'v' + current;
      document.getElementById('update-latest-ver').textContent = 'v' + latest;
      document.getElementById('update-modal-overlay').classList.add('active');
    }

    async function checkVersion() {
      try {
        const response = await fetch('/api/system/version');
        const data = await response.json();
        const badge = document.getElementById('version-badge');
        if (!badge) return;

        badge.dataset.current = data.current;
        badge.dataset.latest = data.latest;

        if (data.needsUpdate && data.current !== 'unknown') {
          badge.innerHTML = `◈ v${data.current} <span style="color:var(--cyan);">(Update!)</span>`;
          badge.classList.add('update-ready');
          badge.onclick = () => {
            document.getElementById('update-current-ver').textContent = 'v' + data.current;
            document.getElementById('update-latest-ver').textContent = 'v' + data.latest;
            document.getElementById('update-modal-overlay').classList.add('active');
          };
        } else {
          badge.innerHTML = `◈ v${data.current}`;
          badge.classList.remove('update-ready');
          badge.onclick = null;
        }
      } catch (e) { console.warn('Version check failed', e); }
    }

    async function executeUpdate(method) {
      const modal = document.querySelector('#update-modal-overlay .modal');
      const latestVer = document.getElementById('update-latest-ver').textContent;
      
      // Step 1: Initialize
      modal.innerHTML = `
        <div class="update-status-container">
          <div class="ora-spinner"></div>
          <div class="status-step" id="update-step">Initializing Update...</div>
          <div class="status-sub">Method: ${method === 'npm' ? 'NPM Mirror' : 'Official CLI'}</div>
        </div>
      `;

      // Step 2: Set Step Info
      setTimeout(() => {
        const stepEl = document.getElementById('update-step');
        if (stepEl) stepEl.textContent = `Downloading & Installing ${latestVer}...`;
      }, 1500);

      try {
        const res = await fetch('/api/system/update', { 
          method: 'POST', 
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ method }) 
        });
        const result = await res.json();
        
        if (result.status === 'success') {
          // Success State
          modal.innerHTML = `
            <div class="update-status-container">
              <div class="ora-spinner" style="border-color: var(--status-done); animation: none; box-shadow: 0 0 20px var(--status-done);"></div>
              <div class="status-step" style="color: var(--status-done)">Update Successful!</div>
              <div class="status-sub">Claude Code is now at ${latestVer}</div>
              <div class="status-sub" style="margin-top:10px">Refreshing system in 2s...</div>
            </div>
          `;
          setTimeout(() => location.reload(), 2000);
        } else {
          throw new Error(result.error);
        }
      } catch (e) {
        // Error State
        modal.innerHTML = `
          <div class="update-status-container">
            <div class="ora-spinner" style="border-color: var(--status-error); animation: none;"></div>
            <div class="status-step" style="color: var(--status-error)">Update Failed</div>
            <div class="status-sub">${e.message}</div>
            <button class="btn btn-ghost" onclick="location.reload()" style="margin-top: 20px;">Close & Retry</button>
          </div>
        `;
      }
    }

    function closeUpdateModal() { document.getElementById('update-modal-overlay').classList.remove('active'); }

    async function load() {
      try {
        const res = await fetch(`/api/sessions?limit=${pagination.limit}&offset=${pagination.offset}`);
        const data = await res.json();
        const sessions = data.sessions || [];
        document.getElementById('count').textContent = `${sessions.length} sessions`;
        document.getElementById('list').innerHTML = sessions.map(s => `
          <div class="session-card" onclick="location.href='/terminal/${s.id}'">
            <div>
              <div style="display:flex; align-items:center; gap:8px;">
                <span class="session-status ${s.status}"></span>
                <span style="font-family:var(--font-mono); font-size:0.75rem; color:var(--bronze)">${s.id.slice(0,8)}...</span>
              </div>
              <div style="margin:4px 0; font-weight:500;">${escapeHtml(s.name || 'Untitled')}</div>
              <div style="font-size:0.75rem; color:var(--text-muted)">Started: ${new Date(s.startTime).toLocaleString()}</div>
            </div>
          </div>
        `).join('');
      } catch (e) { document.getElementById('list').innerHTML = '<div style="text-align:center;padding:20px">Error loading sessions</div>'; }
    }

    async function loadConfig() {
      try {
        const res = await fetch('/api/config');
        currentConfig = await res.json();
        
        document.getElementById('config-path').textContent = currentConfig.claudePath || '~/.claude';
        document.getElementById('config-model').textContent = currentConfig.model || 'not set';
        
        // Fix IP and User display
        const ip = currentConfig.ip || '127.0.0.1';
        const user = currentConfig.user || 'unknown';
        document.getElementById('config-host').textContent = ip;
        document.getElementById('config-user').textContent = user;
      } catch (e) {
        console.error('Failed to load config:', e);
      }
    }

    async function loadServers() {
      const res = await fetch('/api/servers');
      const data = await res.json();
      document.getElementById('servers-list').innerHTML = (data.servers || []).map(s => `
        <div class="server-tag" onclick="toggleServerSessions('${s.id}')">
          <span class="server-status ${s.connected ? 'connected' : ''}"></span>
          <span>${s.name || s.id}</span>
        </div>
        <div id="server-sessions-${s.id}" style="display:none; width:100%; padding:10px;"></div>
      `).join('');
    }

    async function toggleServerSessions(id) {
      const el = document.getElementById(`server-sessions-${id}`);
      if (el.style.display === 'block') {
        el.style.display = 'none';
        return;
      }
      
      el.style.display = 'block';
      // Ora-style loading state
      el.innerHTML = `
        <div class="scanner-text">
          <div class="mini-ora"></div>
          <span>◈ Scanning remote sectors...</span>
        </div>
      `;
      
      try {
        const res = await fetch(`/api/servers/${id}/sessions`);
        const data = await res.json();
        const sessions = data.sessions || [];
        
        if (sessions.length === 0) {
          el.innerHTML = '<div style="padding:10px; color:var(--text-dark); font-size:0.8rem;">No active sessions found.</div>';
          return;
        }

        // Clear loading and render with staggered animation
        el.innerHTML = '';
        sessions.forEach((s, index) => {
          const card = document.createElement('div');
          card.className = 'session-card stagger-in';
          card.style.margin = '4px 0';
          card.style.animationDelay = `${index * 50}ms`; // 50ms stagger
          card.onclick = () => location.href = `/terminal/${id}/${s.id}`;
          
          card.innerHTML = `
            <div style="font-size:0.8rem; display:flex; align-items:center; gap:8px; width:100%">
              <span class="session-status ${s.status}"></span>
              <div style="flex:1">
                <div style="color:var(--cyan); font-weight:500;">${escapeHtml(s.name || s.id.slice(0,8))}</div>
                <div style="font-size:0.7rem; color:var(--text-dark)">ID: ${s.id.slice(0,8)}...</div>
              </div>
              <span class="remote-badge">REMOTE</span>
            </div>
          `;
          el.appendChild(card);
        });
      } catch (e) {
        el.innerHTML = '<div style="color:var(--status-error); font-size:0.8rem; padding:10px;">✕ Sector scan failed.</div>';
      }
    }

    function openEditModal() { document.getElementById('edit-modal-overlay').classList.add('active'); }
    function closeEditModal() { document.getElementById('edit-modal-overlay').classList.remove('active'); }
    function openAddServerModal() { document.getElementById('add-server-modal-overlay').classList.add('active'); }
    function closeAddServerModal() { document.getElementById('add-server-modal-overlay').classList.remove('active'); }
    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    (function init() {
      loadConfig(); load(); loadServers(); checkVersion();
      setInterval(checkVersion, 3600000);
      setInterval(load, 15000);
    })();
  </script>
